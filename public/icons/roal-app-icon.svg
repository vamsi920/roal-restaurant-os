<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">ROAL app icon</title>
  <desc id="desc">A premium rounded-square ROAL mark with a phone call becoming a kitchen ticket.</desc>
  <defs>
    <linearGradient id="bg" x1="126" y1="74" x2="870" y2="948" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff8ff"/>
