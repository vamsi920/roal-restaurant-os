      <stop offset=".72" stop-color="#8b6dff"/>
      <stop offset="1" stop-color="#151018"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(310 224) rotate(51) scale(720)">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset=".28" stop-color="#f4edff" stop-opacity=".82"/>
      <stop offset=".62" stop-color="#a98cff" stop-opacity=".2"/>
      <stop offset="1" stop-color="#160f22" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="228" y1="176" x2="806" y2="856" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".88"/>
      <stop offset=".48" stop-color="#ffffff" stop-opacity=".38"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".12"/>
    </linearGradient>
    <linearGradient id="ink" x1="280" y1="210" x2="770" y2="814" gradientUnits="userSpaceOnUse">
