      <stop offset=".56" stop-color="#241737"/>
      <stop offset="1" stop-color="#0c0911"/>
    </linearGradient>
    <linearGradient id="accent" x1="304" y1="282" x2="730" y2="738" gradientUnits="userSpaceOnUse">
