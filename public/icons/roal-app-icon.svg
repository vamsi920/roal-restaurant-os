      <path d="M376 380c36-36 84-57 143-57 49 0 91 15 127 45s57 70 63 118c6 51-7 94-40 129-33 35-76 53-130 53h-54l-74 45 13-74-25-18c-36-26-56-65-60-116-3-50 9-92 37-125z" fill="#fff8ff" opacity=".94"/>
      <path d="M420 402c22-22 51-34 88-34 31 0 57 9 79 27 22 18 35 43 39 74 4 33-5 61-26 84-21 23-49 34-84 34h-76l9-54h63c17 0 31-5 41-16 10-11 14-25 12-42-2-16-9-29-20-38-11-9-25-14-42-14-18 0-33 6-44 17-11 11-16 26-14 44l-54 1c-3-33 7-61 29-83z" fill="url(#accent)"/>
      <path d="M350 354c-22 25-36 57-39 94-4 58 15 107 58 146" fill="none" stroke="#b8ff73" stroke-width="28" stroke-linecap="round"/>
      <path d="M674 616l74 74m0-74l-74 74" stroke="#b8ff73" stroke-width="34" stroke-linecap="round"/>
