<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">ROAL user icon</title>
  <desc id="desc">A premium user avatar icon in ROAL's lavender and black theme.</desc>
  <defs>
    <linearGradient id="bg" x1="58" y1="38" x2="452" y2="484" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff9ff"/>
      <stop offset=".42" stop-color="#d8c4ff"/>
      <stop offset=".76" stop-color="#8166ff"/>
      <stop offset="1" stop-color="#111018"/>
    </linearGradient>
    <radialGradient id="shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(158 105) rotate(48) scale(360)">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".92"/>
      <stop offset=".5" stop-color="#fff4ff" stop-opacity=".35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="person" x1="156" y1="126" x2="358" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#171221"/>
      <stop offset=".7" stop-color="#231633"/>
      <stop offset="1" stop-color="#0c0a10"/>
    </linearGradient>
    <linearGradient id="accent" x1="130" y1="140" x2="390" y2="395" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff2b6"/>
      <stop offset=".45" stop-color="#d7ff74"/>
      <stop offset="1" stop-color="#9d85ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#160c22" flood-opacity=".34"/>
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#ffffff" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect x="24" y="24" width="464" height="464" rx="132" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="132" fill="url(#shine)"/>
  <path d="M84 134c55-56 134-79 218-56 84 22 139 86 158 166 15 63 5 127-30 180" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity=".38"/>
  <g filter="url(#shadow)">
    <rect x="96" y="94" width="320" height="328" rx="100" fill="#fff" fill-opacity=".42" stroke="#fff" stroke-opacity=".62" stroke-width="5"/>
    <circle cx="256" cy="202" r="70" fill="url(#person)"/>
    <path d="M143 378c13-77 57-119 113-119s100 42 113 119c-27 27-65 44-113 44s-86-17-113-44z" fill="url(#person)"/>
    <path d="M198 191c15-31 45-52 81-52 28 0 52 11 69 29" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"/>
    <path d="M162 332c18-38 52-60 94-60 42 0 76 22 94 60" fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>
    <circle cx="350" cy="145" r="24" fill="#d9ff75"/>
    <path d="M345 145h10m-5-5v10" stroke="#1a1226" stroke-width="4" stroke-linecap="round"/>
  </g>
  <rect x="28" y="28" width="456" height="456" rx="128" fill="none" stroke="#fff" stroke-opacity=".55" stroke-width="5"/>
